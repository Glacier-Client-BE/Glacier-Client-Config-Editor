<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Glacier Client Config Editor | Glacier Productions</title>
    <meta name="description" content="Visually edit, drag and export your Glacier Client config.json for Minecraft Bedrock Edition. Toggle modules, tweak opacity and reposition the HUD in real time." />
    <link rel="canonical" href="https://config.glacierclient.xyz" />
    <meta property="og:title" content="Glacier Config Editor" />
    <meta property="og:description" content="Visually edit, drag and export your Glacier Client config.json." />
    <meta property="og:image" content="https://glacierclient.xyz/assets/mod_menu.png" />
    <meta property="og:url" content="https://config.glacierclient.xyz" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
    <header id="mainHeader">
        <div class="top-bar">
            <a class="branding" href="https://glacierclient.xyz/" target="_blank" rel="noopener">
                <img src="assets/logo.png" alt="Glacier Client" class="logo-icon" width="36" height="36" />
                <div class="branding-text">
                    <div class="branding-title">Glacier Client Config Editor</div>
                    <div class="branding-sub">Glacier Productions</div>
                </div>
            </a>

            <div class="top-bar-spacer"></div>

            <nav class="nav-tabs" id="versionTabs" aria-label="Config version"></nav>

            <div class="seg-group">
                <button class="icon-btn-sm" id="undoBtn" title="Undo (Ctrl+Z)" aria-label="Undo" disabled><i class="fas fa-undo"></i></button>
                <button class="icon-btn-sm" id="redoBtn" title="Redo (Ctrl+Y)" aria-label="Redo" disabled><i class="fas fa-redo"></i></button>
            </div>

            <button class="header-icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
            <button class="header-icon-btn hide-sm" id="tutorialBtn" title="Tutorial / Help" aria-label="Open tutorial"><i class="fas fa-book"></i></button>
            <a class="header-discord" href="https://dsc.gg/glacierclientmcbe" target="_blank" rel="noopener"><i class="fab fa-discord"></i><span>Discord</span></a>
        </div>
    </header>

    <main>
        <div class="mobile-switch" id="mobileSwitch">
            <button data-view="config" class="active"><i class="fas fa-cog"></i> Config</button>
            <button data-view="preview"><i class="fas fa-eye"></i> Preview</button>
        </div>

        <div class="workspace card-base anim-slide-up">
            <!-- ── Sidebar: configuration ── -->
            <aside class="ws-sidebar" id="configPanel">
                <div class="ws-sidebar-head">
                    <div class="panel-head-row">
                        <h2 class="panel-title"><i class="fas fa-sliders-h"></i> Configuration</h2>
                        <button class="chip-btn danger" id="resetSectionBtn" title="Reset current section"><i class="fas fa-rotate-left"></i> Reset</button>
                    </div>
                    <div class="section-pills" id="sectionPills"></div>
                    <div class="search-bar" id="searchWrap">
                        <i class="fas fa-search search-ico"></i>
                        <input type="text" id="searchInput" placeholder="Search modules…" aria-label="Search modules" />
                        <button class="search-clear" id="searchClear" aria-label="Clear search"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <div class="scroll-body" id="controlsScroll">
                    <div class="controls-list" id="controlsList"></div>
                </div>

                <div class="ws-sidebar-foot">
                    <div class="export-wrap">
                        <button class="btn btn-primary" id="exportBtn" aria-haspopup="true" aria-expanded="false">
                            <i class="fas fa-download"></i> Export <i class="fas fa-chevron-up caret"></i>
                        </button>
                        <div class="export-menu" id="exportMenu" role="menu">
                            <button class="export-opt" id="optPack" role="menuitem">
                                <span class="export-opt-ico"><i class="fas fa-box-open"></i></span>
                                <span class="export-opt-text">
                                    <span class="eo-title">Download Config Pack <span class="eo-badge">Recommended</span></span>
                                    <span class="eo-sub">.mcpack — import straight into Minecraft</span>
                                </span>
                            </button>
                            <button class="export-opt" id="optJson" role="menuitem">
                                <span class="export-opt-ico"><i class="fas fa-file-code"></i></span>
                                <span class="export-opt-text">
                                    <span class="eo-title">Export JSON</span>
                                    <span class="eo-sub">Raw config.json file</span>
                                </span>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-ghost" id="importBtn" title="Import JSON" aria-label="Import JSON"><i class="fas fa-upload"></i></button>
                    <input type="file" id="fileInput" accept=".json,application/json" hidden />
                </div>
            </aside>

            <!-- ── Preview stage ── -->
            <section class="ws-preview mobile-hidden" id="previewPanel">
                <div class="ws-preview-bar">
                    <div class="view-tabs">
                        <button class="view-tab active" data-view="visual"><i class="fas fa-eye"></i> Visual</button>
                        <button class="view-tab" data-view="raw"><i class="fas fa-code"></i> Code</button>
                    </div>
                    <div class="ws-preview-actions">
                        <button class="chip-btn accent" id="copyBtn" style="display:none"><i class="fas fa-copy"></i> Copy</button>
                        <button class="tool-btn active" id="bgToggle" title="Toggle Minecraft background" aria-label="Toggle background"><i class="fas fa-image"></i></button>
                        <button class="tool-btn" id="fsToggle" title="Fullscreen" aria-label="Fullscreen"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
                <div class="ws-preview-body" id="viewBody"></div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-content">
                <a class="footer-brand" href="https://glacierclient.xyz/" target="_blank" rel="noopener">
                    <img src="assets/logo.png" alt="Glacier Client Logo" class="footer-logo" width="38" height="38" />
                    <span class="brand-name">Glacier Client</span>
                </a>
                <nav class="footer-social" aria-label="Social media links">
                    <a href="https://discord.glacierclient.xyz/" class="social-link" target="_blank" rel="noopener" aria-label="Discord"><i class="fab fa-discord"></i></a>
                    <a href="https://github.com/Glacier-Client-BE" class="social-link" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
                    <a href="https://youtube.com/@glacierclient" class="social-link" target="_blank" rel="noopener" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="https://x.com/glacierclientbe" class="social-link" target="_blank" rel="noopener" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="https://www.instagram.com/glacierclientmcbe" class="social-link" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@glacierclientmcbe" class="social-link" target="_blank" rel="noopener" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                </nav>
            </div>
            <p class="copyright-text">&copy; <span id="currentYear"></span> Glacier Client · Config Editor · made for the community ·
                <a href="#" id="footerTutorial">Tutorial</a>
            </p>
        </div>
    </footer>

    <!-- ── Tutorial modal ── -->
    <div class="modal-overlay" id="tutorialModal">
        <div class="card-base modal" role="dialog" aria-modal="true" aria-label="Configuration tutorial">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-badge"><i class="fas fa-snowflake"></i></div>
                    <div>
                        <div class="modal-title">Configuration Guide</div>
                        <div class="modal-sub">Locate · edit · customize</div>
                    </div>
                </div>
                <button class="header-icon-btn" id="modalClose" aria-label="Close tutorial"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-tabs" id="modalTabs"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-foot">
                <span class="muted" style="font-size:.68rem"><kbd>Esc</kbd> to close</span>
                <button class="btn btn-primary" id="modalGotIt" style="flex:0">Got it</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

    <script src="config-data.js"></script>
    <script src="app.js"></script>
</body>

</html>
